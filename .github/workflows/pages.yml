name: Deploy Thumbsup Gallery to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run the build manually from the Actions tab
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# Grants the required permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Gallery with Thumbsup Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            ghcr.io/thumbsup/thumbsup \
            /bin/sh -c "cd /work && thumbsup --config config.json"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4